<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKD 订阅规则编辑器</title>
    <script src="https://gitee.com/lhj1618/GGKD/raw/master/todo/json5.js"></script>
    <script src="https://raw.giteeusercontent.com/lhj1618/GGKD/raw/master/todo/FileSaver.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #000000;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .title {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .tool-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 16px;
            background: #1a1a1a;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
            margin-left: 6px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .panel {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .panel-title {
            font-size: 18px;
            margin-bottom: 12px;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-item {
            border: 1px solid #333333;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .app-header {
            padding: 12px;
            background: #242424;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .app-name {
            font-weight: 600;
            color: #ffffff;
        }
        .app-pkg {
            font-size: 12px;
            color: #999999;
            margin-top: 4px;
        }
        .app-body {
            padding: 12px;
            display: none;
        }
        .app-body.show { display: block; }
        .group-item {
            border-left: 3px solid #3b82f6;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #242424;
            border-radius: 6px;
        }
        .group-name {
            font-weight: 500;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            color: #ffffff;
        }
        .rule-item {
            font-size: 13px;
            color: #cccccc;
            padding: 6px 0;
            border-bottom: 1px dashed #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rule-actions {
            display: flex;
            gap: 4px;
        }
        .status {
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .success { background: #065f46; color: #ffffff; }
        .error { background: #7f1d1d; color: #ffffff; }
        .empty-tip {
            text-align: center;
            color: #666666;
            padding: 20px 0;
        }
        #codeEditor {
            width: 100%;
            height: 600px;
            padding: 12px;
            border: 1px solid #333333;
            border-radius: 8px;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            background: #121212;
            color: #ffffff;
        }
        #appListContainer {
            display: block;
        }

        /* 编辑源码弹窗样式 */
        .edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 800px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .modal-title {
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #ffffff;
        }
        .modal-textarea {
            width: 100%;
            height: 350px;
            padding: 12px;
            border: 1px solid #333333;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 16px;
            background: #121212;
            color: #ffffff;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">GKD 订阅规则可视化编辑器</h1>
    </div>

    <div class="tool-bar">
        <input type="file" id="fileInput" accept=".json5" style="display: none;">
        <button class="btn btn-primary" id="importBtn">导入</button>
        <button class="btn btn-success" id="exportBtn">导出</button>
        <button class="btn btn-primary" id="addAppBtn">新增应用</button>
        <button class="btn btn-danger" id="clearBtn">清空</button>
        <button class="btn btn-warning" id="toggleCodeBtn">切换源码</button>
        <button class="btn btn-warning" id="formatBtn">格式化</button>
    </div>

    <div id="status" class="status"></div>

    <div class="panel">
        <div class="panel-title">
            <span>应用 & 规则 管理</span>
        </div>
        
        <div id="appListContainer">
            <div id="appList">
                <div class="empty-tip">请导入 GKD 订阅文件开始编辑</div>
            </div>
        </div>

        <textarea id="codeEditor" placeholder="编辑源码会自动实时解析..."></textarea>
    </div>

    <!-- 编辑源码弹窗 -->
    <div class="edit-modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">编辑源码</div>
            <textarea class="modal-textarea" id="modalEditor"></textarea>
            <div class="modal-buttons">
                <button class="btn btn-danger" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveModal()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let gkdData = {};
        const codeEditor = document.getElementById('codeEditor');
        const appListContainer = document.getElementById('appListContainer');
        const statusBox = document.getElementById('status');
        const editModal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalEditor = document.getElementById('modalEditor');
        let isCodeMode = false;
        let currentEdit = null;

        // 提示
        function showStatus(msg, type = 'success') {
            statusBox.textContent = msg;
            statusBox.className = `status ${type}`;
            statusBox.style.display = 'block';
            setTimeout(() => statusBox.style.display = 'none', 3000);
        }

        // 自动解析源码
        function parseData() {
            try {
                const val = codeEditor.value.trim();
                gkdData = val ? JSON5.parse(val) : { apps: [] };
                if (!gkdData.apps) gkdData.apps = [];
                renderAppList();
                return true;
            } catch (e) {
                showStatus('解析失败：' + e.message, 'error');
                return false;
            }
        }

        // 同步到源码
        function syncCode() {
            codeEditor.value = JSON5.stringify(gkdData, null, 2);
        }

        // 切换界面
        document.getElementById('toggleCodeBtn').onclick = () => {
            isCodeMode = !isCodeMode;
            if (isCodeMode) {
                syncCode();
                appListContainer.style.display = 'none';
                codeEditor.style.display = 'block';
                document.getElementById('toggleCodeBtn').textContent = '切换可视化';
            } else {
                codeEditor.style.display = 'none';
                appListContainer.style.display = 'block';
                parseData();
                document.getElementById('toggleCodeBtn').textContent = '切换源码';
            }
        };

        codeEditor.addEventListener('input', parseData);

        // 渲染
        function renderAppList() {
            const appList = document.getElementById('appList');
            if (!gkdData.apps.length) {
                appList.innerHTML = '<div class="empty-tip">暂无应用规则</div>';
                return;
            }

            let html = '';
            gkdData.apps.forEach((app, aIdx) => {
                const appName = app.name || '未命名应用';
                const appPkg = app.id || app.package || '无包名';
                
                html += `
                <div class="app-item">
                    <div class="app-header" onclick="toggleApp(this)">
                        <div>
                            <div class="app-name">${appName}</div>
                            <div class="app-pkg">包名：${appPkg}</div>
                        </div>
                        <div>
                            <button class="btn btn-warning btn-sm" onclick="editApp(${aIdx},event)">编辑源码</button>
                            <button class="btn btn-danger btn-sm" onclick="delApp(${aIdx},event)">删除</button>
                        </div>
                    </div>
                    <div class="app-body">
                        <button class="btn btn-primary btn-sm" onclick="addGroup(${aIdx})">➕ 新增规则组</button>
                        <div style="margin-top:12px;">
                `;

                const groups = app.groups || [];
                groups.forEach((group, gIdx) => {
                    const gk = group.key !== undefined ? group.key : gIdx;
                    const gn = group.name || '未命名组';
                    
                    html += `
                    <div class="group-item">
                        <div class="group-name">
                            [${gk}] ${gn}
                            <button class="btn btn-warning btn-sm" onclick="editGroup(${aIdx},${gIdx},event)">编辑源码</button>
                            <button class="btn btn-danger btn-sm" onclick="delGroup(${aIdx},${gIdx},event)">删除</button>
                            <button class="btn btn-primary btn-sm" onclick="addRule(${aIdx},${gIdx})">➕ 加规则</button>
                        </div>
                    `;

                    const rules = group.rules || [];
                    if (rules.length) {
                        rules.forEach((rule, rIdx) => {
                            const rk = rule.key !== undefined ? rule.key : '';
                            const rn = rule.name || '';
                            const txt = rk !== '' ? `[${rk}] ${rn}` : rn;
                            html += `
                            <div class="rule-item">
                                <span>${txt}</span>
                                <div class="rule-actions">
                                    <button class="btn btn-warning btn-sm" onclick="editRule(${aIdx},${gIdx},${rIdx},event)">编辑源码</button>
                                    <button class="btn btn-danger btn-sm" onclick="delRule(${aIdx},${gIdx},${rIdx},event)">删除</button>
                                </div>
                            </div>`;
                        });
                    } else {
                        html += '<div class="empty-tip" style="padding:6px;text-align:left;">该规则组暂无子规则</div>';
                    }
                    html += '</div>';
                });

                if (!groups.length) {
                    html += '<div class="empty-tip" style="padding:6px;text-align:left;">该应用暂无规则组</div>';
                }

                html += `</div></div></div>`;
            });
            appList.innerHTML = html;
        }

        window.toggleApp = el => el.nextElementSibling.classList.toggle('show');

        // ==============================================
        // 弹窗编辑源码
        // ==============================================
        function openModal(title, data, callback) {
            modalTitle.textContent = title;
            modalEditor.value = JSON5.stringify(data, null, 2);
            currentEdit = callback;
            editModal.style.display = 'flex';
        }
        window.closeModal = () => {
            editModal.style.display = 'none';
            currentEdit = null;
        };
        window.saveModal = () => {
            try {
                const val = modalEditor.value.trim();
                const data = JSON5.parse(val);
                if (currentEdit) currentEdit(data);
                closeModal();
                syncCode();
                renderAppList();
                showStatus('保存成功');
            } catch (e) {
                showStatus('JSON格式错误', 'error');
            }
        };

        // 编辑功能
        window.editApp = (aIdx, e) => {
            e.stopPropagation();
            openModal('编辑应用源码', gkdData.apps[aIdx], (data) => {
                gkdData.apps[aIdx] = data;
            });
        };
        window.editGroup = (aIdx, gIdx, e) => {
            e.stopPropagation();
            openModal('编辑规则组源码', gkdData.apps[aIdx].groups[gIdx], (data) => {
                gkdData.apps[aIdx].groups[gIdx] = data;
            });
        };
        window.editRule = (aIdx, gIdx, rIdx, e) => {
            e.stopPropagation();
            openModal('编辑子规则源码', gkdData.apps[aIdx].groups[gIdx].rules[rIdx], (data) => {
                gkdData.apps[aIdx].groups[gIdx].rules[rIdx] = data;
            });
        };

        // ==============================================
        // 新增 / 删除
        // ==============================================
        window.delApp = (idx, e) => { e.stopPropagation(); if(confirm('确定删除该应用？')){ gkdData.apps.splice(idx,1); syncCode(); renderAppList(); } };
        window.delGroup = (a,g,e) => { e.stopPropagation(); if(confirm('确定删除该规则组？')){ gkdData.apps[a].groups.splice(g,1); syncCode(); renderAppList(); } };
        window.delRule = (a,g,r,e) => { e.stopPropagation(); if(confirm('确定删除该子规则？')){ gkdData.apps[a].groups[g].rules.splice(r,1); syncCode(); renderAppList(); } };

        document.getElementById('addAppBtn').onclick = () => {
            gkdData.apps.push({ id: '', name: '', groups: [] });
            syncCode(); renderAppList(); showStatus('新增应用成功');
        };
        window.addGroup = aIdx => {
            gkdData.apps[aIdx].groups.push({ key:0, name:'', rules:[] });
            syncCode(); renderAppList(); showStatus('新增规则组成功');
        };
        window.addRule = (aIdx,gIdx) => {
            gkdData.apps[aIdx].groups[gIdx].rules.push({ key:0, name:'', match:'' });
            syncCode(); renderAppList(); showStatus('新增子规则成功');
        };

        // ==============================================
        // 导入文件功能
        // ==============================================
        document.getElementById('importBtn').onclick = () => {
            document.getElementById('fileInput').click();
        };
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                codeEditor.value = evt.target.result;
                parseData();
                showStatus('文件导入成功！');
            };
            reader.readAsText(file);
        };

        // 文件操作
        document.getElementById('exportBtn').onclick = () => {
            parseData();
            saveAs(new Blob([codeEditor.value],{type:'application/json5'}),`gkd_${Date.now()}.json5`);
            showStatus('导出成功');
        };
        document.getElementById('formatBtn').onclick = () => { parseData(); syncCode(); showStatus('格式化完成'); };
        document.getElementById('clearBtn').onclick = () => {
            if(confirm('确定清空所有数据？')){ gkdData={apps:[]}; codeEditor.value=''; renderAppList(); showStatus('已清空','warning'); }
        };

        renderAppList();
    </script>
</body>
</html>
